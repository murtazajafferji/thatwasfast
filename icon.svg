<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#09090b"/>
  <rect width="512" height="512" rx="96" fill="none" stroke="#a855f7" stroke-width="3" opacity="0.2"/>
  
  <!-- Checkmark - bold, dynamic angle -->
  <polyline points="130,270 210,370 390,145" fill="none" stroke="url(#g)" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Speed lines - trailing from the checkmark -->
  <rect x="60" y="195" width="80" height="8" rx="4" fill="#a855f7" opacity="0.5"/>
  <rect x="40" y="220" width="100" height="8" rx="4" fill="#a855f7" opacity="0.35"/>
  <rect x="70" y="245" width="65" height="8" rx="4" fill="#a855f7" opacity="0.2"/>
  
  <!-- Subtle spark/flash at the tip -->
  <circle cx="390" cy="145" r="12" fill="#c084fc" opacity="0.6"/>
  <circle cx="390" cy="145" r="6" fill="#fff" opacity="0.4"/>
</svg>
