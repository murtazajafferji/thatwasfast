<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="245" fill="#09090b"/>
  <circle cx="256" cy="256" r="245" fill="none" stroke="#a855f7" stroke-width="4" opacity="0.3"/>
  
  <!-- T - left -->
  <rect x="58" y="140" width="120" height="28" rx="4" fill="url(#g)"/>
  <rect x="103" y="140" width="28" height="180" rx="4" fill="url(#g)"/>
  
  <!-- W - center, formed by the lightning bolt -->
  <!-- Lightning bolt that reads as a W -->
  <polygon points="215,140 255,240 235,240 285,370 245,260 265,260 215,140" fill="url(#g)"/>
  <polygon points="265,140 305,240 285,240 335,370 295,260 315,260 265,140" fill="url(#g)"/>
  
  <!-- F - right -->
  <rect x="365" y="140" width="28" height="180" rx="4" fill="url(#g)"/>
  <rect x="365" y="140" width="100" height="28" rx="4" fill="url(#g)"/>
  <rect x="365" y="225" width="75" height="24" rx="4" fill="url(#g)"/>
  
  <!-- Speed lines -->
  <rect x="35" y="360" width="60" height="4" rx="2" fill="#a855f7" opacity="0.4"/>
  <rect x="55" y="375" width="40" height="4" rx="2" fill="#a855f7" opacity="0.25"/>
  <rect x="45" y="390" width="50" height="4" rx="2" fill="#a855f7" opacity="0.15"/>
</svg>
